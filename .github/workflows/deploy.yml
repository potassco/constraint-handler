name: deploy to pypi

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    name: deploy
    needs: test
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: determine release target
        id: release_meta
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "repository_url=https://pypi.org/legacy/" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\.dev[0-9]+$ ]]; then
            echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "repository_url=https://test.pypi.org/legacy/" >> "$GITHUB_OUTPUT"
          else
            echo "Release tag must match vMajor.Minor.Revision or vMajor.Minor.Revision.devN, got: $TAG_NAME" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install build dependencies
        run: python3 -m pip install build
  
      - name: build package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.release_meta.outputs.version }}
        run: python3 -m build --sdist --wheel --outdir dist/

      - name: upload package
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: dist/

      - name: publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ steps.release_meta.outputs.repository_url }}
